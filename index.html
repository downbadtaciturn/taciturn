<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curiosity Wins 😏</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  overflow: hidden;
}

.container {
  text-align: center;
  padding: 20px;
  width: 450px;
  max-width: 90vw;
  min-height: 350px;
  border-radius: 20px;
  background: rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-sizing: border-box;
}

h1, h2, p { margin: 6px 0; }

/* Buttons in horizontal row */
.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 20px;
}

/* Sure button */
#yes {
  width: 130px;
  height: 45px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  font-family: 'Segoe UI', sans-serif;
  border-radius: 25px;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s ease, background 0.25s ease;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#yes:hover { transform: scale(1.1); }

/* Not sure button */
#no {
  width: 200px;
  height: 45px;
  background: #555;
  color: white;
  font-weight: bold;
  font-family: 'Segoe UI', sans-serif;
  border-radius: 25px;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 10px;
  text-align: center;
  white-space: normal;
  word-break: break-word;
  transition: transform 0.25s ease, background 0.25s ease;
}

#no:hover { transform: scale(1.05); background: #666; }

/* Click animation for Not sure */
@keyframes clickPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.1); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

.click-animate { animation: clickPulse 0.35s ease; }

/* Mobile adjustments */
@media (max-width: 600px) {
  #yes { width: 120px; height: 40px; font-size: 14px; }
  #no { width: 160px; height: 40px; font-size: 14px; }
  h1 { font-size: 1.8rem; }
  h2 { font-size: 1.4rem; }
  p { font-size: 0.95rem; } /* smaller to prevent emoji overflow */
}

/* Meme text style */
.meme-container {
  position: relative;
  display: inline-block;
  max-width: 90%;
}

.meme-text {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 1.2rem;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 4px #000;
}
</style>
</head>
<body>

<div class="container" id="main">
  <h1>Hey Wedad 😊</h1>
  <p>I just wanted to make you smile today 😄</p>
  <p>You seem really fun and amazing 💖</p>
  <p>I’d love the chance to get to know you better 😌</p>
  <h2>So... Can I?</h2>

  <div class="buttons">
    <button id="yes" onclick="sayYes()">Sure 😊</button>
    <button id="no" onclick="moveNo()">Not sure 😅</button>
  </div>
</div>

<script>
let step = 0;
let locked = false;
const texts = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];

const btn = document.getElementById('no');

function moveNo() {
  if (locked) return;
  if (step < texts.length) {
    btn.innerText = texts[step];
    btn.classList.remove('click-animate');
    void btn.offsetWidth;
    btn.classList.add('click-animate');
  }

  if (step === texts.length - 1) {
    locked = true;
    moveButton();

    if (!('ontouchstart' in window)) {
      btn.onmouseover = moveButton;
    } else {
      btn.ontouchstart = (e) => { e.preventDefault(); moveButton(); };
    }
  }
  step++;
}

function moveButton() {
  const padding = 10;
  const btnWidth = btn.offsetWidth;
  const btnHeight = btn.offsetHeight;
  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;
  const maxX = screenWidth - btnWidth - padding;
  const maxY = screenHeight - btnHeight - padding;
  const x = Math.random() * maxX;
  const y = Math.random() * maxY;
  btn.style.position = 'fixed';
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
}

function sayYes() {
  const gifURL = "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif";
  
  document.getElementById('main').innerHTML = `
    <div class="meme-container">
      <div class="meme-text">ME:</div>
      <img src="${gifURL}" style="width:100%; border-radius:15px;">
    </div>
  `;
}
</script>

</body>
</html>
