<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Curiosity 😄</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #a18cd1);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.page { display: none; opacity: 0; transition: opacity 0.5s ease; }
.active { display: block; opacity: 1; }

.card {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  color: white;
  width: 90%;
  max-width: 400px;
  height: 350px;          /* fixed height PC */
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
  animation: fadeIn 1s ease;
}

.text-container {
  height: 180px;           /* fixed height PC */
  flex-shrink: 0;          /* prevent shrinking */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.text-container h1, .text-container p {
  margin: 5px 0;
  font-size: clamp(16px, 4vw, 26px);
  word-wrap: break-word;
}

.button-container {
  margin-top: auto;        /* buttons always at bottom of card */
  display: flex;
  justify-content: center;
  gap: 10px;
  width: 100%;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 50px;
  min-width: 80px;
  flex-shrink: 0;
}

.yes-btn {
  background: #ff4d88;
  color: white;
  white-space: nowrap;
}
.no-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  max-width: 120px;
  white-space: normal;
  text-align: center;
  line-height: 1.2;
  overflow-wrap: break-word;
  padding: 8px 12px;
  flex-shrink: 0;
}

button:hover { transform: scale(1.05); }
button:active { transform: scale(0.95); }

@keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

@media (max-width: 500px) {
  .card { height: 330px; padding: 15px; }
  .text-container { height: 160px; }
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <div class="text-container">
      <h1>Hey Wedad 😊</h1>
      <p>Thanks for taking a moment to open this.</p>
    </div>
    <div class="button-container">
      <button class="yes-btn" onclick="nextPage(2)">Next</button>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Just something small…</h1>
      <p>It might feel sudden, but I’m really curious about you… just a little 😊</p>
    </div>
    <div class="button-container">
      <button class="yes-btn" onclick="nextPage(3)">Continue</button>
    </div>
  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Final Question 😳</h1>
      <p>Would it be okay if I get to know you?</p>
    </div>
    <div class="button-container" id="btnContainer">
      <button id="yesBtn" class="yes-btn" onclick="yesClick()">YES 💖</button>
      <button id="noBtn" class="no-btn" onclick="noClick()">No 😢</button>
    </div>
  </div>
</div>

<script>
// Page navigation
function nextPage(pageNumber){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+pageNumber).classList.add("active");
}

// YES button click → GIF
function yesClick(){
  document.body.innerHTML = `
    <div style="
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1);
      backdrop-filter: blur(10px);
    ">
      <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif"
           alt="Celebration GIF"
           style="width:80%; max-width:400px; border-radius:20px; box-shadow:0 8px 20px rgba(0,0,0,0.3); opacity:0; animation:fadeInGIF 1s forwards;">
    </div>
    <style>
      @keyframes fadeInGIF {
        from { opacity:0; transform: scale(0.8); }
        to { opacity:1; transform: scale(1); }
      }
    </style>
  `;
}

// NO button 7-step messages + hover evade
let noMessages = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];
let noIndex = 0;
let evadeMode = false;

function noClick(){
  const btn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const textBoxHeight = document.querySelector("#page3 .text-container").offsetHeight;
  
  // YES button enlarge progressively on each click (max 75% of text box height)
  let currentYesHeight = parseFloat(getComputedStyle(yesBtn).height);
  let newYesHeight = Math.min(textBoxHeight*0.75, currentYesHeight + 15);
  yesBtn.style.height = newYesHeight + "px";
  yesBtn.style.transition = "all 0.3s ease";
  
  // NO button shrink progressively
  let currentNoHeight = parseFloat(getComputedStyle(btn).height);
  let newNoHeight = Math.max(30, currentNoHeight - 5);
  btn.style.height = newNoHeight + "px";
  
  // Adjust NO text font size
  let baseFontSize = 16;
  let scale = newNoHeight / 50; // original 50px height
  btn.style.fontSize = (baseFontSize * scale) + "px";
  
  // Update NO messages
  if(noIndex < noMessages.length){
    btn.innerText = noMessages[noIndex];
    noIndex++;
    if(noIndex === noMessages.length){
      btn.style.position = 'fixed';
      btn.style.zIndex = 1000;
      evadeMode = true;
      moveButton();
    }
  }
}

function moveButton(){
  const btn = document.getElementById("noBtn");
  const minPercent = 5;
  const maxPercent = 95;
  const xPercent = Math.random()*(maxPercent - minPercent) + minPercent;
  const yPercent = Math.random()*(maxPercent - minPercent) + minPercent;
  btn.style.left = xPercent + "%";
  btn.style.top = yPercent + "%";
  btn.style.transform = "translate(-50%, -50%)";
}

// Evade on PC hover
document.addEventListener("mousemove", e=>{
  if(!evadeMode) return;
  const btn = document.getElementById("noBtn");
  const rect = btn.getBoundingClientRect();
  const dx = Math.abs(e.clientX - (rect.left + rect.width/2));
  const dy = Math.abs(e.clientY - (rect.top + rect.height/2));
  if(dx<100 && dy<100) moveButton();
});

// Evade on mobile touch
document.addEventListener("touchstart", ()=>{
  if(evadeMode) moveButton();
});
</script>
</body>
</html>
