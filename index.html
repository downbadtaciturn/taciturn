<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Quicksand', sans-serif;
}

/* BACKGROUND (simple gradient) */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* desktop = plain */
.box {
  width: 320px;
  padding: 20px;
  text-align: center;
  color: white;
}

/* MOBILE ONLY DESIGN */
@media (max-width: 768px) {

  body::before {
    content: "❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤ ❤";
    position: absolute;
    font-size: 28px;
    color: rgba(255,255,255,0.12);
    width: 200%;
    height: 200%;
    transform: rotate(-15deg);
    pointer-events: none;
  }

  .box {
    width: 85%;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.25);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
}

/* INPUT */
input {
  width: 90%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  text-align: center;
  outline: none;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: #ff4b5c;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* MESSAGE */
#page2 {
  display: none;
  text-align: left;
  line-height: 1.7;
  max-height: 70vh;
  overflow-y: auto;
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="box">
  <h2>🔒 Private</h2>
  <p>Enter your name</p>

  <input type="text" id="nameInput" placeholder="Your name">
  <button onclick="checkName()">Enter</button>

  <p id="error"></p>
</div>

<!-- PAGE 2 -->
<div id="page2" class="box">
  <h1>Hi Wedad 💖</h1>

  <p id="l1"></p>
  <p id="l2"></p>
  <p id="l3"></p>
  <p id="l4"></p>
  <p id="l5"></p>
</div>

<script>
function checkName() {
  let name = document.getElementById("nameInput").value.trim();

  if (name === "Wedad") {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    startTyping();
  } else {
    document.getElementById("error").innerText = "❌";
  }
}

/* slow typing */
function type(el, text, speed, cb) {
  let i = 0;
  function run() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(run, speed);
    } else if (cb) {
      setTimeout(cb, 600);
    }
  }
  run();
}

function startTyping() {
  type(document.getElementById("l1"),
  "This might feel a little random 😅 but I’ve been thinking about you for a while now.", 70, () => {

  type(document.getElementById("l2"),
  "I didn’t want to just keep it in my head anymore… so I made this instead.", 70, () => {

  type(document.getElementById("l3"),
  "I don’t really know you deeply yet, but I like the idea of knowing you more.", 70, () => {

  type(document.getElementById("l4"),
  "There’s just something about you that made me not want to miss the chance.", 70, () => {

  type(document.getElementById("l5"),
  "If you’re open to it, I’d love to start talking… no pressure at all.", 70);

  }); }); }); });
}
</script>

</body>
</html>
