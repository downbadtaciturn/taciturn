<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Curiosity 😄</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #a18cd1);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page { display: none; }
.active { display: block; }

.card {
  width: 90%;
  max-width: 400px;
  height: 350px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  color: white;
  display: flex;
  flex-direction: column;
  padding: 20px;
}

.text-container {
  height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.button-container {
  margin-top: auto;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  height: 50px;
  min-width: 80px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.yes-btn {
  background: #ff4d88;
  color: white;
}

.no-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  max-width: 120px;
}

button:hover { transform: scale(1.05); }
button:active { transform: scale(0.95); }

@media (max-width: 500px) {
  .card { height: 330px; }
  .text-container { height: 160px; }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <div class="text-container">
      <h1>Hey Wedad 😊</h1>
      <p>Thanks for taking a moment to open this.</p>
    </div>
    <div class="button-container">
      <button onclick="nextPage(2)">Next</button>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Just something small…</h1>
      <p>It might feel sudden, but I’m really curious about you… just a little 😊</p>
    </div>
    <div class="button-container">
      <button onclick="nextPage(3)">Continue</button>
    </div>
  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Final Question 😳</h1>
      <p>Would it be okay if I get to know you?</p>
    </div>
    <div class="button-container">
      <button id="yesBtn" class="yes-btn" onclick="yesClick()">YES 💖</button>
      <button id="noBtn" class="no-btn" onclick="noClick()">No 😢</button>
    </div>
  </div>
</div>

<script>
function nextPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById("page"+p).classList.add("active");
}

function yesClick(){
  document.body.innerHTML = `
  <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
    <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif" style="width:80%;max-width:400px;border-radius:20px;">
  </div>`;
}

let msgs = [
"Wait… sure ka? 😅",
"Not even a little curious? 😄",
"Like 100% sure? 🥺",
"Just one chance? 😆",
"I promise I’m nice 😄",
"Let’s find out? 😊",
"Last chance 😏"
];

let i = 0;
let evade = false;

function noClick(){
  const no = document.getElementById("noBtn");
  const yes = document.getElementById("yesBtn");

  let cardHeight = document.querySelector("#page3 .card").offsetHeight;

  // YES grow (balanced)
  let y = parseFloat(getComputedStyle(yes).height);
  let newY = Math.min(cardHeight * 0.6, y + 20);
  yes.style.height = newY + "px";
  yes.style.width = Math.min(220, yes.offsetWidth + 15) + "px";

  // NO shrink
  let n = parseFloat(getComputedStyle(no).height);
  let newN = Math.max(12, n - 8);
  no.style.height = newN + "px";

  let font = Math.max(8, 16*(newN/50));
  no.style.fontSize = font + "px";

  // text change
  if(i < msgs.length){
    no.innerText = msgs[i];
    i++;

    if(i === msgs.length){
      no.style.position = "fixed";
      evade = true;
      move();
      no.style.transform = "scale(0.5)";
    }
  }
}

function move(){
  const no = document.getElementById("noBtn");
  no.style.left = (Math.random()*90+5)+"%";
  no.style.top = (Math.random()*90+5)+"%";
  no.style.transform += " translate(-50%, -50%)";
}

document.addEventListener("mousemove", e=>{
  if(!evade) return;
  const no = document.getElementById("noBtn");
  const r = no.getBoundingClientRect();
  if(Math.abs(e.clientX-(r.left+r.width/2))<80 &&
     Math.abs(e.clientY-(r.top+r.height/2))<80){
    move();
  }
});

document.addEventListener("touchstart", ()=>{
  if(evade) move();
});
</script>

</body>
</html>
