<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Final Question 😳</h1>
      <p>Would it be okay if I get to know you?</p>
    </div>
    <div class="button-container" style="position:relative; height:60px;">
      <button id="yesBtn" class="yes-btn">YES 💖</button>
      <button id="noBtn" class="no-btn">No 😢</button>
    </div>
  </div>
</div>

<script>
// YES click function (safe, no accidental triggers)
let yesClicked = false;
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const card = document.querySelector("#page3 .card");

yesBtn.addEventListener("click", function(){
  if(yesClicked) return; 
  yesClicked = true;
  document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg, #ff9a9e, #a18cd1);">
      <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif"
      style="width:80%;max-width:400px;border-radius:20px;">
    </div>`;
});

// NO button logic with 7-step messages + evade + shrink
let noMessages = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];
let noIndex = 0;
let evadeMode = false;

noBtn.addEventListener("click", function(){
  // Show next NO message
  if(noIndex < noMessages.length){
    noBtn.innerText = noMessages[noIndex];
    noIndex++;
    if(noIndex === noMessages.length){
      // Enter evade mode
      noBtn.style.position = "fixed";
      noBtn.style.zIndex = 1000;
      evadeMode = true;
    }
  }

  // YES button grows safely
  let cardHeight = card.offsetHeight;
  yesBtn.style.height = Math.min(cardHeight*0.6, yesBtn.offsetHeight + 20) + "px";
  yesBtn.style.width = Math.min(220, yesBtn.offsetWidth + 15) + "px";

  // NO button shrinks text only
  let newH = Math.max(12, noBtn.offsetHeight - 5);
  noBtn.style.height = newH + "px";
  noBtn.style.fontSize = Math.max(8, 16*(newH/50)) + "px";

  // Move NO button
  if(evadeMode) moveNO();
});

// Function to move NO avoiding YES overlap
function moveNO(){
  const cardRect = card.getBoundingClientRect();
  const yesRect = yesBtn.getBoundingClientRect();
  let x, y, attempts = 0;
  const buffer = 20; // minimum distance from YES

  do {
    x = Math.random()*80 + 10; // 10%-90%
    y = Math.random()*50 + 25; // avoid extreme top/bottom
    attempts++;
    if(attempts>50) break; // fail-safe to prevent NO stuck
  } while(
    (x/100*cardRect.width + cardRect.left < yesRect.right + buffer &&
     x/100*cardRect.width + cardRect.left + noBtn.offsetWidth > yesRect.left - buffer) &&
    (y/100*cardRect.height + cardRect.top < yesRect.bottom + buffer &&
     y/100*cardRect.height + cardRect.top + noBtn.offsetHeight > yesRect.top - buffer)
  );

  noBtn.style.transition = "left 0.3s ease, top 0.3s ease";
  noBtn.style.left = x + "%";
  noBtn.style.top = y + "%";
  noBtn.style.transform = "translate(-50%, -50%)";
}

// Evade on hover (PC)
document.addEventListener("mousemove", e=>{
  if(!evadeMode) return;
  const r = noBtn.getBoundingClientRect();
  if(Math.abs(e.clientX-(r.left+r.width/2))<80 && Math.abs(e.clientY-(r.top+r.height/2))<80){
    moveNO();
  }
});

// Evade on touch (mobile)
document.addEventListener("touchstart", ()=>{
  if(evadeMode) moveNO();
});
