<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Curiosity 😄</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #a18cd1);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .page { display: none; opacity: 0; transition: opacity 0.5s ease; }
  .active { display: block; opacity: 1; }

  .card {
    background: rgba(255,255,255,0.15);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    text-align: center;
    color: white;
    width: 90%;
    max-width: 400px;
    animation: fadeIn 1s ease;
    position: relative;
  }

  h1 { margin-bottom: 10px; font-size: clamp(18px,4vw,28px); }
  p { margin-bottom: 20px; line-height: 1.5; font-size: clamp(14px,3.5vw,18px); }

  .button-container {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    height: 60px;
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .yes-btn {
    background: #ff4d88;
    color: white;
    box-shadow: 0 4px 15px rgba(255,77,136,0.5);
    animation: pulse 2s infinite;
  }

  .yes-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 25px rgba(255,77,136,0.8);
  }

  .no-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    position: relative;
  }

  .no-btn:hover { transform: scale(0.95); }
  button:active { transform: scale(0.9); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.08);} 100%{transform:scale(1);} }

  @media (max-width: 500px) {
    .card { width: 95%; padding: 15px; }
  }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <h1>Hi… [name] 😊</h1>
    <p>Thanks for taking a moment to open this.</p>
    <div class="button-container">
      <button class="yes-btn" onclick="nextPage(2)">Next</button>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <h1>Just something small…</h1>
    <p>It might feel sudden, but I’m really curious about you… just a little 😊</p>
    <div class="button-container">
      <button class="yes-btn" onclick="nextPage(3)">Continue</button>
    </div>
  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="card">
    <h1>Final Question 😳</h1>
    <p>Would it be okay if I get to know you?</p>
    <div class="button-container" id="btnContainer">
      <button class="yes-btn" onclick="yesClick()">YES 💖</button>
      <button id="noBtn" class="no-btn" onclick="noClick()">No 😢</button>
    </div>
  </div>
</div>

<script>
function nextPage(pageNumber){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+pageNumber).classList.add("active");
}

// YES button → fade-in GIF
function yesClick(){
  document.body.innerHTML = `
    <div style="
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1);
      backdrop-filter: blur(10px);
    ">
      <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif"
           alt="Celebration GIF"
           style="width:80%; max-width:400px; border-radius:20px; box-shadow:0 8px 20px rgba(0,0,0,0.3); opacity:0; animation:fadeInGIF 1s forwards;">
    </div>
    <style>
      @keyframes fadeInGIF {
        from { opacity:0; transform: scale(0.8); }
        to { opacity:1; transform: scale(1); }
      }
    </style>
  `;
}

// NO button → 7-step messages + evade
let noMessages = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];
let noIndex = 0;
let evadeMode = false;

function noClick(){
  const btn = document.getElementById("noBtn");
  if(noIndex < noMessages.length){
    btn.innerText = noMessages[noIndex];
    noIndex++;
    if(noIndex === noMessages.length){
      btn.style.position = 'fixed';
      btn.style.zIndex = 1000;
      evadeMode = true;
      moveButton();
    }
  }
}

function moveButton(){
  const btn = document.getElementById("noBtn");
  const minPercent = 5;
  const maxPercent = 95;
  const xPercent = Math.random()*(maxPercent - minPercent) + minPercent;
  const yPercent = Math.random()*(maxPercent - minPercent) + minPercent;
  btn.style.left = xPercent + "%";
  btn.style.top = yPercent + "%";
  btn.style.transform = "translate(-50%, -50%)";
}

// Evade on PC hover
document.addEventListener("mousemove", e=>{
  if(!evadeMode) return;
  const btn = document.getElementById("noBtn");
  const rect = btn.getBoundingClientRect();
  const dx = Math.abs(e.clientX - (rect.left + rect.width/2));
  const dy = Math.abs(e.clientY - (rect.top + rect.height/2));
  if(dx<100 && dy<100) moveButton();
});

// Evade on mobile touch
document.addEventListener("touchstart", ()=>{
  if(evadeMode) moveButton();
});
</script>

</body>
</html>
