<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Quicksand', sans-serif;
}

/* 🌸 ANIMATED PASTEL BACKGROUND */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 💖 FLOATING HEARTS */
.hearts {
  position: absolute;
  width: 100%;
  height: 100%;
}

.hearts span {
  position: absolute;
  bottom: -50px;
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
}

/* 💎 GLASS CARD */
.box {
  position: relative;
  z-index: 2;

  width: 330px;
  padding: 25px;
  text-align: center;
  color: white;

  border-radius: 25px;

  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.4);

  box-shadow: 0 10px 35px rgba(0,0,0,0.2);
}

/* TEXT */
h1, h2, p {
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* INPUT */
input {
  width: 90%;
  padding: 12px;
  margin-top: 15px;

  border-radius: 15px;
  border: none;
  outline: none;

  background: rgba(255,255,255,0.9);
  color: #444;
}

/* BUTTON (cute glow) */
button {
  margin-top: 15px;
  padding: 10px 18px;

  border: none;
  border-radius: 15px;

  background: #ff6fa5;
  color: white;
  font-weight: bold;

  cursor: pointer;

  box-shadow: 0 0 15px rgba(255,111,165,0.6);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  background: #ff4f8b;
  box-shadow: 0 0 25px rgba(255,111,165,1);
}

/* PAGE 2 */
#page2 {
  display: none;
  text-align: left;
  line-height: 1.7;
  max-height: 70vh;
  overflow-y: auto;
}

h1 {
  text-align: center;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- 💖 HEARTS -->
<div class="hearts" id="hearts"></div>

<!-- PAGE 1 -->
<div id="page1" class="box">
  <h2>🔒 Private</h2>
  <p>Enter your name</p>

  <input type="text" id="nameInput" placeholder="Your name">
  <button onclick="checkName()">Enter</button>

  <p id="error"></p>
</div>

<!-- PAGE 2 -->
<div id="page2" class="box">
  <h1>Hi Wedad 💖</h1>

  <p id="l1"></p>
  <p id="l2"></p>
  <p id="l3"></p>
  <p id="l4"></p>
  <p id="l5"></p>
</div>

<script>
/* 💖 HEART GENERATOR */
function createHearts() {
  const container = document.getElementById("hearts");

  setInterval(() => {
    let heart = document.createElement("span");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (14 + Math.random() * 12) + "px";
    heart.style.animationDuration = (6 + Math.random() * 4) + "s";

    container.appendChild(heart);

    setTimeout(() => heart.remove(), 10000);
  }, 400);
}
createHearts();

/* NAME CHECK */
function checkName() {
  let name = document.getElementById("nameInput").value.trim();

  if (name.toLowerCase() === "wedad") {
    document.getElementById("page1").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("page1").style.display = "none";
      document.getElementById("page2").style.display = "block";
      startTyping();
    }, 600);
  } else {
    document.getElementById("error").innerText = "❌";
  }
}

/* TYPING EFFECT */
function type(el, text, speed, cb) {
  let i = 0;
  function run() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(run, speed);
    } else if (cb) {
      setTimeout(cb, 600);
    }
  }
  run();
}

function startTyping() {
  type(document.getElementById("l1"),
  "This might feel a little random 😅 but I’ve been thinking about you for a while now.", 70, () => {

  type(document.getElementById("l2"),
  "I didn’t want to just keep it in my head anymore… so I made this instead.", 70, () => {

  type(document.getElementById("l3"),
  "I don’t really know you deeply yet, but I like the idea of knowing you more.", 70, () => {

  type(document.getElementById("l4"),
  "There’s just something about you that made me not want to miss the chance.", 70, () => {

  type(document.getElementById("l5"),
  "If you’re open to it, I’d love to start talking… no pressure at all.", 70);

  }); }); }); });
}
</script>

</body>
</html>
