<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Curiosity Wins 😏</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
/* RESET & BODY */
body {
  margin: 0;
  min-height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #ffb347, #ff7e5f);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* CONTAINER */
.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 25px;
  padding: 30px 20px;
  max-width: 400px;
  margin: auto;
  text-align: center;
  animation: fadeIn 1.5s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* TEXT STYLING */
h1, h2, p {
  margin: 5px 0;
  line-height: 1.4;
  color: #fff;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
}

h1 { font-size: 2.5rem; font-weight: 600; }
h2 { font-size: 1.8rem; font-weight: 600; }
p  { font-size: 1.3rem; font-weight: 400; }

/* BUTTONS */
.buttons { margin-top: 25px; }

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
  box-sizing: border-box;
  user-select: none;
}

/* YES BUTTON */
#yes {
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  font-weight: bold;
  box-shadow: 0 6px 15px rgba(255,0,100,0.3);
  animation: pulse 2s infinite;
}

#yes:hover { transform: scale(1.1); }
#yes:active { transform: scale(0.95); }

/* NO BUTTON */
#no {
  background: #fff5f5;
  color: #ff4d6d;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.2s ease, background 0.2s ease;
}

#no:hover { background: #ffe1e8; }
#no:active { transform: scale(0.9); }

/* MOBILE STYLING */
@media (max-width: 600px) {
  h1 { font-size: 2rem; }
  h2 { font-size: 1.5rem; }
  p  { font-size: 1.1rem; }
  button { width: 80%; font-size: 16px; padding: 10px 18px; }
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

@keyframes gradientBG {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

.heart {
  position: absolute;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>
<div class="container" id="main">
  <h1>Hey Wedad 😊</h1>
  <p>I wanted to make you smile today 😊</p>
  <p>You seem really awesome and fun 💖</p>
  <p>I’d love to get to know you more 😄</p>
  <h2>Can I get to know you?</h2>

  <div class="buttons">
    <button id="yes" onclick="sayYes()">Sure 😊</button>
    <button id="no" onclick="moveNo()">Not sure 😅</button>
  </div>
</div>

<script>
let step = 0;
const texts = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];

const btn = document.getElementById('no');

function moveNo() {
  if (step < texts.length) {
    btn.innerText = texts[step];
  }

  // Last step: move immediately + attach hover/touch
  if (step === texts.length - 1) {
    moveButtonRandomly(btn); // MOVE immediately

    // PC hover
    if (!('ontouchstart' in window)) {
      btn.onmouseover = () => moveButtonRandomly(btn);
    } else { // Touch devices
      btn.ontouchend = (e) => { e.preventDefault(); moveButtonRandomly(btn); };
    }
  }

  step++;
}

function moveButtonRandomly(btn) {
  const padding = 20;
  const x = Math.random() * (window.innerWidth - btn.offsetWidth - padding*2) + padding;
  const yMax = window.innerHeight - btn.offsetHeight - padding*2;
  const y = window.innerWidth <= 600 ? Math.random() * (yMax * 0.7) + padding : Math.random() * yMax + padding;

  btn.style.position = 'absolute';
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
}

function sayYes() {
  const gifURL = "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJlam9pcnppOTd2bzd6ZXZyb2owdjNkZW0wMWVza2JxZmxleGdjOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/gPKXsLUHCCTZQKvPJf/giphy.gif";

  document.getElementById('main').innerHTML = `
    <div style="animation: fadeIn 1s ease;">
      <img src="${gifURL}" style="max-width:90%; border-radius:20px;">
    </div>
  `;

  for (let i = 0; i < 25; i++) createHeart();
}

function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  const colors = ['#ff4d6d', '#ff758c', '#ffe1e8', '#ff7eb3'];
  heart.innerHTML = '';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.fontSize = (Math.random() * 25 + 25) + 'px';
  heart.style.color = colors[Math.floor(Math.random() * colors.length)];
  heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 4000);
}
</script>
</body>
</html>
