
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Curiosity 😄</title>
<style>
* { box-sizing: border-box; }
html, body { margin:0; padding:0; height:100%; font-family:'Segoe UI', sans-serif; background: linear-gradient(135deg,#ff9a9e,#a18cd1); }
body { min-height:100dvh; display:flex; justify-content:center; align-items:center; }

.page {
  display: none; /* hidden by default */
  width: 100%;
  height: 100dvh;
  justify-content: center;
  align-items: center;
}
.page.active { display: flex; }

.card {
  width: 90%;
  max-width: 400px;
  height: 350px;
  min-height: 350px;
  max-height: 350px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  color: white;
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow: hidden;
}

.text-container {
  height: 180px; min-height:180px; max-height:180px;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  text-align:center;
  flex-shrink:0;
  overflow:hidden;
}

.text-container h1, .text-container p { margin:5px 0; font-size:clamp(16px,4vw,26px); }

.button-container { margin-top:auto; display:flex; justify-content:center; gap:10px; }
button {
  height:50px;
  min-width:80px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.yes-btn { background:#ff4d88; color:white; }
.no-btn { background: rgba(255,255,255,0.2); color:white; max-width:120px; text-align:center; }
button:hover { transform: scale(1.05); }
button:active { transform: scale(0.95); }

@media (max-width:500px){
  .card { height:330px; min-height:330px; max-height:330px; }
  .text-container { height:160px; min-height:160px; max-height:160px; }
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <div class="text-container">
      <h1>Hey Wedad 😊</h1>
      <p>Thanks for taking a moment to open this.</p>
    </div>
    <div class="button-container">
      <button onclick="nextPage(2)">Next</button>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Just something small…</h1>
      <p>It might feel sudden, but I’m really curious about you… just a little 😊</p>
    </div>
    <div class="button-container">
      <button onclick="nextPage(3)">Continue</button>
    </div>
  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="card">
    <div class="text-container">
      <h1>Final Question 😳</h1>
      <p>Would it be okay if I get to know you?</p>
    </div>
    <div class="button-container">
      <button id="yesBtn" class="yes-btn" onclick="yesClick()">YES 💖</button>
      <button id="noBtn" class="no-btn" onclick="noClick()">No 😢</button>
    </div>
  </div>
</div>

<script>
function nextPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".page").forEach(x=>x.style.display="none");
  const target = document.getElementById("page"+p);
  target.classList.add("active");
  target.style.display = "flex";
}

// YES → show GIF
function yesClick(){
  document.body.innerHTML = `
  <div style="display:flex;justify-content:center;align-items:center;height:100dvh;">
    <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif"
    style="width:80%;max-width:400px;border-radius:20px;">
  </div>`;
}

// NO button 7-step messages + evade + hide mode
let msgs = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];

let i = 0;
let evade = false;
let hideMode = false;

function noClick(){
  const no = document.getElementById("noBtn");
  const yes = document.getElementById("yesBtn");

  // lock YES temporarily
  yes.disabled = true;

  // YES grow
  let cardHeight = document.querySelector("#page3 .card").offsetHeight;
  let y = parseFloat(getComputedStyle(yes).height);
  yes.style.height = Math.min(cardHeight*0.6, y+20)+"px";
  yes.style.width = Math.min(220, yes.offsetWidth+15)+"px";

  // NO shrink
  let n = parseFloat(getComputedStyle(no).height);
  let newN = Math.max(12, n-8);
  no.style.height = newN+"px";
  let font = Math.max(8, 16*(newN/50));
  no.style.fontSize = font+"px";

  // NO text
  if(i < msgs.length){
    no.innerText = msgs[i];
    i++;
    if(i === msgs.length){
      no.style.position = "fixed";
      evade = true;
      hideMode = false;
      move();
      no.style.transform = "scale(0.5)";
    }
  } else if(i >= msgs.length && evade){
    hideMode = true; // start hide & run
    move();
  }

  setTimeout(()=>{ yes.disabled = false; }, 200);
}

function move(){
  const no = document.getElementById("noBtn");
  let min=5, max=95;
  let speed = 0.3; // normal speed

  if(hideMode){ min=0; max=100; speed=0.1; }
  no.style.transition = `left ${speed}s ease, top ${speed}s ease`;

  const x = Math.random()*(max-min)+min;
  const y = Math.random()*(max-min)+min;

  no.style.left = x + "%";
  no.style.top = y + "%";
  no.style.transform += " translate(-50%, -50%)";
}

// Evade on PC hover
document.addEventListener("mousemove", e=>{
  if(!evade) return;
  const no = document.getElementById("noBtn");
  const r = no.getBoundingClientRect();
  if(Math.abs(e.clientX-(r.left+r.width/2))<80 &&
     Math.abs(e.clientY-(r.top+r.height/2))<80){
    move();
  }
});

// Evade on mobile touch
document.addEventListener("touchstart", ()=>{
  if(evade) move();
});
</script>

</body>
</html>
