<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Little Curiosity 💖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
  overflow:hidden;
}
.page{
  display:none;
  opacity:0;
  transform:translateY(20px) scale(.98);
  transition:all .5s ease;
}
.page.active{
  display:block;
  opacity:1;
  transform:translateY(0) scale(1);
}
.card-wrapper{
  width:min(420px,92vw);
  height:min(460px,86vh);
}
.card{
  width:100%;
  height:100%;
  padding:28px;
  border-radius:28px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.25);
  box-shadow:0 12px 40px rgba(0,0,0,.15);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  position:relative;
  overflow:hidden;
}
h1{font-size:clamp(22px,5vw,28px);margin-bottom:14px}
p{font-size:clamp(15px,3.8vw,16px);line-height:1.6;margin-bottom:24px}
.button-container{
  position:relative;
  width:100%;
  min-height:110px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
}
button{
  border:none;
  border-radius:30px;
  padding:14px 24px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s ease;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}
button:active{transform:scale(.95)}
.yes-btn{background:#ff4d88;color:#fff;z-index:10}
.no-btn{background:rgba(255,255,255,.2);color:#fff;position:relative;z-index:5}
.success-screen{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  width:100%;
  padding:20px;
}
.success-card{
  width:min(420px,92vw);
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:28px;
  text-align:center;
  color:white;
  box-shadow:0 12px 40px rgba(0,0,0,.2);
  position:relative;
  overflow:hidden;
}
.success-card img{
  width:100%;
  border-radius:18px;
  margin-top:15px;
}
canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
@media (max-width:480px){
  .card{padding:22px}
  .button-container{min-height:130px}
  button{font-size:14px;padding:12px 18px}
}
</style>
</head>
<body>

<audio id="bgMusic" autoplay loop playsinline>
  <source src="JAO - TORPE (Lyric Visualizer).mp3" type="audio/mpeg">
</audio>

<div id="page1" class="page active">
  <div class="card-wrapper">
    <div class="card">
      <h1>Hey Wedad 😊</h1>
      <p>Thanks for taking a moment to open this.</p>
      <button class="yes-btn" onclick="nextPage(2)">Next</button>
    </div>
  </div>
</div>

<div id="page2" class="page">
  <div class="card-wrapper">
    <div class="card">
      <h1>Just something small…</h1>
      <p>This might feel a little random 😅<br><br>
      I’ve been a bit curious about you.<br><br>
      I thought I’d try this simple way of saying hi 😊</p>
      <button class="yes-btn" onclick="nextPage(3)">Continue</button>
    </div>
  </div>
</div>

<div id="page3" class="page">
  <div class="card-wrapper">
    <div class="card" id="mainCard">
      <h1>Can I ask you something?</h1>
      <p>Would it be okay if we get to know each other a little? 😊</p>
      <div class="button-container">
        <button id="yesBtn" class="yes-btn">Sure 💖</button>
        <button id="noBtn" class="no-btn">Not sure 😢</button>
      </div>
    </div>
  </div>
</div>

<script>
const music = document.getElementById('bgMusic');
music.volume = 0.6;

// autoplay fallback for phones
function tryPlayMusic(){
  music.play().catch(()=>{});
}
document.addEventListener('click', tryPlayMusic, { once:true });
document.addEventListener('touchstart', tryPlayMusic, { once:true });
window.addEventListener('load', tryPlayMusic);

function nextPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');
}

const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');
const card = document.getElementById('mainCard');

const noMessages = [
  'Wait… sure? 😅',
  'Really no? 😄',
  '100% sure? 🥺',
  'One chance? 😆',
  'I’m nice 😄',
  'Let’s try? 😊',
  'Last chance 😏'
];

let noIndex = 0;
let moveInterval = null;

function randomPos(){
  const cardRect = card.getBoundingClientRect();
  const btnRect = noBtn.getBoundingClientRect();
  return {
    x: Math.random() * (cardRect.width - btnRect.width - 30),
    y: Math.random() * (cardRect.height - btnRect.height - 30)
  };
}

function startMoving(){
  if(moveInterval) return;
  noBtn.style.position = 'absolute';
  moveInterval = setInterval(()=>{
    const pos = randomPos();
    noBtn.style.left = pos.x + 'px';
    noBtn.style.top = pos.y + 'px';
  },300);
}

function handleNo(e){
  e.preventDefault();

  if(noIndex < noMessages.length){
    noBtn.innerText = noMessages[noIndex];
    noIndex++;
  }

  noBtn.style.transform = 'scale(.9)';
  setTimeout(()=> noBtn.style.transform = 'scale(1)',150);

  yesBtn.style.transform = `scale(${1 + noIndex*0.08})`;

  if(noIndex >= 6) startMoving();
}

noBtn.addEventListener('click', handleNo);
noBtn.addEventListener('touchstart', handleNo);

yesBtn.addEventListener('click', ()=>{
  document.body.innerHTML = `
    <div class="success-screen">
      <div class="success-card">
        <h1>Yay! 💖</h1>
        <p>You made me this happy 😆</p>
        <img src="https://media.giphy.com/media/akiHW8qDydkm4/giphy.gif">
        <canvas id="confettiCanvas"></canvas>
      </div>
    </div>
    <audio autoplay loop playsinline>
      <source src="JAO - TORPE (Lyric Visualizer).mp3" type="audio/mpeg">
    </audio>
  `;

  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const confetti = Array.from({length:100},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*6+2,
    d:Math.random()*100,
    tilt:Math.random()*10-10,
    a:0,
    inc:Math.random()*0.07+0.05,
    color:`hsl(${Math.random()*360},100%,50%)`
  }));

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
      ctx.beginPath();
      ctx.lineWidth = c.r;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x + c.tilt, c.y);
      ctx.lineTo(c.x, c.y + c.tilt);
      ctx.stroke();

      c.a += c.inc;
      c.y += 2;
      c.x += Math.sin(c.d);
      c.tilt = Math.sin(c.a) * 10;

      if(c.y > canvas.height) c.y = -10;
    });
    requestAnimationFrame(draw);
  }
  draw();
});
</script>
</body>
</html>
