<!DOCTYPE html>
<html>
<head>
  <title>Hi 😊</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #a18cd1);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .page {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .active {
      display: block;
      opacity: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
      color: white;
      width: 320px;
      animation: fadeIn 1s ease;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      line-height: 1.5;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .yes-btn {
      background: #ff4d88;
      color: white;
      box-shadow: 0 4px 15px rgba(255, 77, 136, 0.5);
      animation: pulse 2s infinite;
    }

    .yes-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(255, 77, 136, 0.8);
    }

    .no-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      position: relative; /* initial position */
    }

    .no-btn:hover {
      transform: scale(0.95);
    }

    button:active {
      transform: scale(0.9);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="card">
    <h1>Hi… 😊</h1>
    <p>Thanks for taking a moment to open this.</p>
    <button class="yes-btn" onclick="nextPage(2)">Next</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="card">
    <h1>Just something small...</h1>
    <p>
      We may not be that close yet,<br>
      but I’d really like to change that… slowly.
    </p>
    <button class="yes-btn" onclick="nextPage(3)">Continue</button>
  </div>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="card">
    <h1>Final Question 😳</h1>
    <p>Would it be okay if I get to know you?</p>

    <button class="yes-btn" onclick="yesClick()">YES 💖</button>
    <button id="noBtn" class="no-btn" onclick="noClick()">No 😢</button>
  </div>
</div>

<script>
function nextPage(pageNumber) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + pageNumber).classList.add("active");
}

function yesClick() {
  document.body.innerHTML = `
    <div class="card">
      <h1>Yay 😭💖</h1>
      <p>That honestly means a lot.<br>Looking forward to knowing you 😊</p>
    </div>
  `;
}

// NO BUTTON LOGIC
let noMessages = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];

let noIndex = 0;
let evadeMode = false;

function noClick() {
  const btn = document.getElementById("noBtn");

  if (noIndex < noMessages.length) {
    btn.innerText = noMessages[noIndex];
    noIndex++;

    if (noIndex === noMessages.length) {
      evadeMode = true;
    }
  }
}

// PC hover evade
document.addEventListener("mousemove", function(e) {
  if (!evadeMode) return;

  const btn = document.getElementById("noBtn");
  const rect = btn.getBoundingClientRect();

  const distanceX = Math.abs(e.clientX - (rect.left + rect.width / 2));
  const distanceY = Math.abs(e.clientY - (rect.top + rect.height / 2));

  if (distanceX < 100 && distanceY < 100) {
    moveButton();
  }
});

// Mobile touch evade
document.addEventListener("touchstart", function() {
  if (evadeMode) moveButton();
});

function moveButton() {
  const btn = document.getElementById("noBtn");
  btn.style.position = "fixed"; // stays inside viewport

  const margin = 10;
  const vw = document.documentElement.clientWidth;
  const vh = document.documentElement.clientHeight;

  const btnRect = btn.getBoundingClientRect();
  const btnWidth = btnRect.width;
  const btnHeight = btnRect.height;

  // calculate random position
  let x = Math.random() * (vw - btnWidth - margin * 2) + margin;
  let y = Math.random() * (vh - btnHeight - margin * 2) + margin;

  // clamp to viewport edges
  x = Math.max(margin, Math.min(x, vw - btnWidth - margin));
  y = Math.max(margin, Math.min(y, vh - btnHeight - margin));

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}
</script>

</body>
</html>
