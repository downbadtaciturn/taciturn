<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Curiosity Wins 😏</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.container {
  text-align: center;
  animation: fadeIn 1.5s ease, floaty 3s ease-in-out infinite;
  padding: 20px;
  max-width: 90vw;
  margin: auto;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
}

h1, h2, p {
  line-height: 1.4;
  margin: 5px 0;
  color: #000; /* black font */
}

.buttons { margin-top: 20px; }

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Poppins', sans-serif;
  font-weight: 600;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* YES BUTTON */
#yes {
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color: #fff;
  box-shadow: 0 4px 12px rgba(255,77,109,0.5);
}
#yes:hover { transform: scale(1.1); }
#yes:active { transform: scale(0.95); }

/* NO BUTTON */
#no {
  background: #fff;
  color: #000;
  border: 1px solid #ccc;
}
#no:hover { background: #f0f0f0; transform: scale(1.05); }
#no:active { transform: scale(0.9); }

@media (max-width: 600px) {
  h1 { font-size: 1.8rem; }
  p  { font-size: 1.1rem; }
  h2 { font-size: 1.4rem; }

  button {
    font-size: 16px;
    padding: 10px 18px;
    max-width: 80%;
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes floaty {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1>Hey Wedad 😊</h1>
  <p>I just wanted to make you smile today 😄</p>
  <p>You seem really fun and amazing 💖</p>
  <p>I’d love the chance to get to know you better 😌</p>
  <h2>So… can I? 😏</h2>

  <div class="buttons">
    <button id="yes" onclick="sayYes()">Sure 😊</button>
    <button id="no" onclick="moveNo()">Not sure 😅</button>
  </div>
</div>

<script>
let step = 0;
const texts = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];

const btn = document.getElementById('no');

function moveNo() {
  if (step < texts.length) {
    btn.innerText = texts[step];
    btn.classList.remove('click');
    void btn.offsetWidth;
    btn.classList.add('click');
  }

  if (step === texts.length - 1) {
    moveButtonRandomly(btn);

    if (!('ontouchstart' in window)) {
      btn.addEventListener('mouseover', () => moveButtonRandomly(btn));
    } else {
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        moveButtonRandomly(btn);
      });
    }
  }

  step++;
}

function moveButtonRandomly(btn) {
  // FIX: always inside viewport
  const maxX = window.innerWidth - btn.offsetWidth - 10;
  const maxY = window.innerHeight - btn.offsetHeight - 10;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;

  if (window.innerWidth <= 600) y = Math.random() * (maxY * 0.7);

  btn.style.position = 'absolute';
  btn.style.left = `${x}px`;
  btn.style.top = `${y}px`;
}

function sayYes() {
  const gifURL = "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif";

  document.getElementById('main').innerHTML = `
    <div style="position:relative; display:inline-block;">
      <div style="
        position:absolute;
        top:10px;
        left:10px;
        font-weight:bold;
        color:black;
        text-shadow:2px 2px 5px white;
      ">ME:</div>
      <img src="${gifURL}" style="max-width:90%; border-radius:15px;">
    </div>
  `;
}
</script>

</body>
</html>
