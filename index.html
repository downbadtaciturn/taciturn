<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curiosity Wins 😏</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #2a0f14, #3a0f1c);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 30px 20px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

h1, h2, p {
  color: #fff;
  margin: 6px 0;
}

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 17px;
  border-radius: 25px;
  cursor: pointer;
  border: none;
}

/* YES BUTTON */
#yes {
  background: linear-gradient(135deg, #ff4d6d, #ff7eb3);
  color: white;
  box-shadow: 0 0 20px rgba(255,0,100,0.6);
}

/* NO BUTTON */
#no {
  background: rgba(255,255,255,0.08);
  color: #ff7eb3;
  border: 1px solid rgba(255,126,179,0.4);
}

/* MOBILE */
@media (max-width: 600px) {
  h1 { font-size: 1.8rem; }
  h2 { font-size: 1.4rem; }
  p { font-size: 1rem; }
  button { width: 80%; }
}

/* ANIMATIONS */
@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="main">
  <h1>Hey Wedad 😊</h1>
  <p>I wanted to make you smile today 😊</p>
  <p>You seem really awesome and fun 💖</p>
  <p>I’d love to get to know you more 😄</p>
  <h2>Can I get to know you?</h2>

  <button id="yes" onclick="sayYes()">Sure 😊</button>
  <button id="no" onclick="moveNo()">Not sure 😅</button>
</div>

<script>
let step = 0;
let locked = false;
const texts = [
  "Wait… sure ka? 😅",
  "Not even a little curious? 😄",
  "Like 100% sure? 🥺",
  "Just one chance? 😆",
  "I promise I’m nice 😄",
  "Let’s find out? 😊",
  "Last chance 😏"
];

const btn = document.getElementById('no');

function moveNo() {
  if (locked) return;

  if (step < texts.length) {
    btn.innerText = texts[step];
  }

  if (step === texts.length - 1) {
    locked = true;
    moveButton();

    if (!('ontouchstart' in window)) {
      btn.onmouseover = moveButton; // PC hover
    } else {
      btn.ontouchstart = (e) => { e.preventDefault(); moveButton(); }; // Mobile tap
    }
  }

  step++;
}

function moveButton() {
  const padding = 16;
  const btnWidth = btn.offsetWidth;
  const btnHeight = btn.offsetHeight;

  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;

  const maxX = screenWidth - btnWidth - padding;
  const maxY = screenHeight - btnHeight - padding;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.position = 'fixed';
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
}

function sayYes() {
  const gifURL = "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExNTlya3hwanU0ZHY5ZHlqeDh3YnljNGt1a2VtendoOXZyZno0OXQ1NCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/akiHW8qDydkm4/giphy.gif";
  
  document.getElementById('main').innerHTML = `
    <div style="animation: fadeIn 1s ease;">
      <img src="${gifURL}" style="max-width:90%; border-radius:20px;">
    </div>
  `;
}
</script>

</body>
</html>
